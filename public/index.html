<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Greeting Page</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#ffffff,#6ddfdf,#087878);
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    background:linear-gradient(180deg,#087878,#ffffff9c);
    padding:40px;
    border-radius:15px;
    text-align:center;
    width:300px;
    box-shadow:0 0 20px rgba(90, 90, 90, 0.488);
}

h1{
    color:#ffffff;
}

p{
    color:#ffffff;
}

input{
    width:90%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#087878;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#17abab;
}

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:linear-gradient(180deg,#087878,#ffffff9c);
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:250px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    display:none;
}

.popup h2{
    color:#ffffff;
}

</style>

</head>

<body>
<div class="card" id="inputCard">

<h1>Welcome</h1>
<p>Please enter your name to receive a greeting</p>

<input type="text" id="nameInput" placeholder="Enter your name">

<button onclick="greet()">Submit</button>

</div>
<div class="popup" id="popupCard">
    <h2 id="greetingText"></h2>
</div>

<script>

function greet(){

    const name = document.getElementById("nameInput").value;

    if(name === ""){
        alert("Please enter your name");
        return;
    }

    document.getElementById("greetingText").innerText =
        "Hello " + name + "! Welcome!";

    document.getElementById("inputCard").style.display = "none";

    document.getElementById("popupCard").style.display = "block";
}

</script>

</body>
</html>
